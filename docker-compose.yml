services:
  auth:
    build: .
    container_name: outfit_auth_api
    env_file:
      - .env
      - ../../deploy.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://192.168.0.213,http://localhost:5173,http://localhost:3000}
    ports:
      - "8001:8000"
    volumes:
      - ./migrations:/service/migrations
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auth-network
      - wardrobe-shared
    restart: on-failure

  postgres:
    image: postgres:16-alpine
    container_name: outfit_auth_pg
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    networks:
      - auth-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d auth_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: outfit_auth_redis
    command: [ "redis-server", "--appendonly", "yes" ]
    ports:
      - "16378:6379"
    volumes:
      - redisdata_auth:/data
    networks:
      - auth-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata_auth:
  redisdata_auth:

networks:
  auth-network:
    driver: bridge
  wardrobe-shared:
    external: true
    name: ${WARDROBE_DOCKER_NETWORK:-wardrobe-service_wardrobe-network}
